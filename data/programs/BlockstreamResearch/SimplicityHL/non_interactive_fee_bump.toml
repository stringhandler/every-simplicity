comments = ["This function computes a signature hash for transactions that allows non-interactive fee bumping.", "It omits certain fields from the transaction that can be modified by anyone,", "specifically nLockTime and change/fee outputs amounts.", "Note that nlocktime is not signed.", "Add the hash of the first output (assumed the ONLY non-change output)", "Add all output script pubkeys to the hash, including change and fee outputs script pubkeys", "Combines the transaction hash with additional taproot-related data to form the overall transaction signature hash.", "Add the transaction-specific hash computed earlier", "Helper function to ensure the provided boolean value is not negative.", "Enforces a linear increase in transaction fee over time by adjusting the maximum fee allowed before a transaction is mined.", "[ELEMENTS]:Asset type for the transaction fee (explicitly specifying asset type, typically BTC asset)", "Dec 23 ~8:33am PST", "Check for negative time difference, which shouldn't happen", "Base fee at the time of broadcast", "Calculate the maximum allowed fee as a function of elapsed time", "Ensure there's no overflow in fee calculation", "Assert that the current fees are less than the maximum allowed fee", "Optionally, you could limit the total fee here", "NON-INTERACTIVE FEE BUMPING", "This feature allows anyone, including miners, to increase a transaction's fee by reducing the change amount,", "following a predefined rule that adds 1 satoshi to the fee every second.", "Allowed modifications without affecting the signature:", "- Increase the transaction's nLockTime, delaying its inclusion in a block.", "- Decrease the change output or increase the fee output.", "This enables miners to maximize their fees from transactions without needing external fee bumping services like", "sponsors, Child-Pays-For-Parent (CPFP), or anchor outputs, simplifying fee management for transaction inclusion."]

