comments = ["/ Assert: a == b * expected_q, via divmod", "Check collateral changes", "Option Offer", "A covenant that allows a user to deposit collateral and premium assets,", "and have a counterparty swap settlement asset for both.", "The user can withdraw accumulated settlement asset at any time (with signature).", "After expiry, the user can reclaim any remaining collateral and premium (with signature).", "Paths:", "1. Exercise: Counterparty swaps settlement asset for collateral + premium (no time restriction, optional change)", "2. Withdraw: User withdraws settlement asset (no time restriction, signature required, full amount)", "3. Expiry: User reclaims collateral + premium (after expiry, signature required, full amount)", "Constraints:", "settlement_amount = COLLATERAL_PER_CONTRACT * collateral_amount", "premium_amount = PREMIUM_PER_COLLATERAL * collateral_amount", "Exercise Path", "Counterparty swaps settlement asset for collateral + premium.", "No time restriction - works before and after expiry.", "Layout:", "Both:", "Input[0]: Collateral from covenant", "Input[1]: Premium from covenant", "With change (partial swap):", "Output[0]: Collateral change → covenant", "Output[1]: Premium change → covenant", "Output[2]: Settlement asset → covenant", "Output[3]: Collateral → counterparty", "Output[4]: Premium → counterparty", "Without change (full swap):", "Output[0]: Settlement asset → covenant", "Output[1]: Collateral → counterparty", "Output[2]: Premium → counterparty", "Withdraw Path", "User withdraws accumulated settlement asset.", "No time restriction.", "Requires signature from USER_PUBKEY.", "No change - full withdrawal only.", "Input[0]: Settlement asset from covenant", "Output[0]: Settlement asset → user (any address)", "Expiry Path", "User reclaims remaining collateral and premium after expiry.", "Only allowed after EXPIRY_TIME.", "No change - full reclaim only.", "Output[0]: Collateral → user (any address)", "Output[1]: Premium → user (any address)"]

